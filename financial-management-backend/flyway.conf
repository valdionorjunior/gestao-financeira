# flyway.conf — Configuração do Flyway para desenvolvimento local
# Em produção, sobrescreva via variáveis de ambiente ou CI/CD

flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:financial_management}
flyway.user=${DB_USER:postgres}
flyway.password=${DB_PASSWORD:postgres}
flyway.locations=filesystem:./migrations
flyway.baselineOnMigrate=true
flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.cleanDisabled=true
flyway.placeholderReplacement=false
